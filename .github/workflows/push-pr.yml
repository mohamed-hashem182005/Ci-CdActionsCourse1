on:
    push:
        branches:
          - master
          - "release/**"
        paths:
          - "src/**"
    pull_request:
        branches:
          - main
          - "release/**"
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code 
            uses: actions/checkout@v6.0.2

          - name: Run tests
            run: npm test

